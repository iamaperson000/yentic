name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: yentic_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d yentic_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/yentic_ci
      AUTH_GOOGLE_ID: ci-google-client-id
      AUTH_GOOGLE_SECRET: ci-google-client-secret
      AUTH_SECRET: ci-auth-secret-ci-auth-secret-ci-auth-secret
      PUSHER_APP_ID: "123456"
      PUSHER_SECRET: ci-pusher-secret
      PUSHER_CLUSTER: us2
      NEXT_PUBLIC_PUSHER_KEY: ci-pusher-key
      NEXT_PUBLIC_PUSHER_CLUSTER: us2
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Prisma schema
        run: npx prisma db push --skip-generate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: E2E
        run: npm run test:e2e
